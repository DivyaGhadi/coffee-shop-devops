<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial; background:#f6f7fb; margin:0;">

<!-- TOP NAV -->
<div style="padding:15px; background:black; display:flex; justify-content:space-between; align-items:center;">
  
  <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">
    ← Home
  </a>

  <a href="cart.html" style="color:white; text-decoration:none;">
    🛒 Back to Cart
  </a>

</div>

<!-- CHECKOUT BOX -->
<div style="
max-width:420px;
margin:60px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
">

<h2 style="text-align:center;">Checkout 💳</h2>

<input id="name" placeholder="Full Name" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">
<input id="address" placeholder="Address" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">
<input id="phone" placeholder="Phone" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

<button onclick="placeOrder()" style="
width:100%;
padding:12px;
background:green;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
">
Place Order
</button>

</div>

<script>
function placeOrder(){

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;
let phone = document.getElementById("phone").value;

// validation
if(name === "" || address === "" || phone === ""){
  alert("Please fill all details!");
  return;
}

// success message
alert("🎉 Order Placed Successfully!\nThank you " + name);

// clear cart after order
localStorage.removeItem("cart");

// redirect to home
window.location.href = "index.html";
}
</script>

</body>
</html>
