<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085') center/cover;
">

<!-- LOGIN CARD -->
<div style="
width:90%;
max-width:420px;
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
">

<h2 style="text-align:center; margin-bottom:20px;">Login ☕</h2>

<input id="username" placeholder="Username" style="
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
outline:none;
">

<input id="password" type="password" placeholder="Password" style="
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
outline:none;
">

<p id="msg" style="color:red; text-align:center;"></p>

<button onclick="login()" style="
width:100%;
padding:12px;
background:black;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
">

Login
</button>

<p style="text-align:center; margin-top:15px;">
Don't have an account?
<a href="register.html" style="color:black; font-weight:bold; text-decoration:none;">
Register
</a>
</p>

</div>

<script>
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  let msg = document.getElementById("msg");

  // STATIC CREDENTIALS
  if(user === "admin" && pass === "1234"){
    alert("Login Successful!");
    window.location.href = "index.html";
  } else {
    msg.innerText = "Invalid username or password!";
  }
}
</script>

</body>
</html>
