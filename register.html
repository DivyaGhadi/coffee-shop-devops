<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085') center/cover;
">

<!-- UPDATED CARD -->
<div style="
width:90%;
max-width:420px;
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
">

<h2 style="text-align:center; margin-bottom:20px;">Register ☕</h2>

<input placeholder="Username" style="
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
">

<input placeholder="Email" style="
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
">

<input type="password" placeholder="Password" style="
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
">

<button style="
width:100%;
padding:12px;
background:green;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
">

Create Account
</button>

<p style="text-align:center; margin-top:15px;">
Already have account?
<a href="login.html" style="color:green; text-decoration:none;">Login</a>
</p>

</div>

</body>
</html>
